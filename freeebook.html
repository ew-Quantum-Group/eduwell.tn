<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page non disponible — Sahl</title>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      text-align: center;
      max-width: 420px;
      width: 100%;
      opacity: 0;
      animation: fadeIn 0.5s ease 0.1s forwards;
    }

    /* Icon */
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 32px;
      color: #6e6e73;
    }

    /* Title */
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.022em;
      line-height: 1.2;
      color: #1d1d1f;
      margin-bottom: 12px;
    }

    /* Subtitle */
    p.sub {
      font-size: 15px;
      font-weight: 400;
      color: #6e6e73;
      line-height: 1.6;
      letter-spacing: -0.008em;
      margin-bottom: 36px;
    }

    /* Button */
    a.btn {
      display: inline-block;
      background: #1d1d1f;
      color: #ffffff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 980px;
      letter-spacing: -0.01em;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    a.btn:hover {
      opacity: 0.82;
      transform: scale(1.03);
    }

    a.btn:active {
      transform: scale(0.98);
      opacity: 0.7;
    }

    /* Note */
    p.note {
      margin-top: 20px;
      font-size: 13px;
      color: #a1a1a6;
      line-height: 1.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <svg class="icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M13.19 8.688a4.5 4.5 0 0 1 1.242 7.244l-4.5 4.5a4.5 4.5 0 0 1-6.364-6.364l1.757-1.757m13.35-.622 1.757-1.757a4.5 4.5 0 0 0-6.364-6.364l-4.5 4.5a4.5 4.5 0 0 0 1.242 7.244"/>
    </svg>

    <h1>Cette page n'est<br/>plus disponible</h1>

    <p class="sub">L'offre que vous recherchez n'est plus active<br/>ou a été déplacée.</p>

    <a href="./index.html" class="btn">Voir l'offre</a>

    <p class="note">Créez votre Sahl ID et profitez des meilleures offres dès maintenant.</p>

  </div>
</body>
</html>
