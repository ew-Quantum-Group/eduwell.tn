<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hors ligne | Sahl App</title>
  <meta name="theme-color" content="#0057FF">
  <link rel="shortcut icon" href="./assets/images/app-store.png">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100dvh;background:#f4f4f8;
      font-family:'Figtree',system-ui,sans-serif;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      text-align:center;padding:32px 24px;
      background:radial-gradient(ellipse 80% 60% at 50% 50%,#e8eeff 0%,#f0f2f8 55%,#f4f4f8 100%);
    }
    .icon{width:76px;height:76px;border-radius:20px;margin:0 auto 24px;display:block;
          box-shadow:0 4px 20px rgba(0,87,255,.16),0 0 0 1px rgba(0,0,0,.05)}
    h1{font-family:'DM Serif Display',Georgia,serif;font-size:26px;font-weight:400;
       color:#0a0a0f;margin-bottom:10px}
    h1 em{font-style:italic;color:#0057FF}
    p{font-size:14px;color:#7a7a8e;line-height:1.65;max-width:300px;margin:0 auto 28px}
    button{
      padding:14px 30px;background:#0a0a0f;color:#fff;
      border:none;border-radius:12px;
      font-size:14.5px;font-weight:600;
      font-family:'Figtree',system-ui,sans-serif;
      cursor:pointer;
      box-shadow:0 4px 18px rgba(0,0,0,.14);
      transition:background .2s,transform .15s;
    }
    button:hover{background:#1a1a2e;transform:translateY(-1px)}
    button:active{transform:translateY(0)}
    .dot{width:8px;height:8px;border-radius:50%;background:#ff0033;
         display:inline-block;margin-right:7px;
         animation:pulse 1.5s infinite}
    .status{margin-top:20px;font-size:12px;color:#b0b0c0;display:flex;align-items:center;justify-content:center}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  </style>
</head>
<body>
  <img class="icon" src="./assets/images/app-store.png" alt="Sahl App">
  <h1>Vous êtes<br><em>hors ligne</em></h1>
  <p>Vérifiez votre connexion Wi-Fi ou données mobiles, puis réessayez.</p>
  <button onclick="location.reload()">↻ Réessayer</button>
  <div class="status"><span class="dot"></span>Connexion indisponible</div>
  <script>window.addEventListener('online',function(){location.reload()});</script>
</body>
</html>
