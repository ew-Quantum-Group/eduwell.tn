<!DOCTYPE html>
<html lang="fr">
<head>
     <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FNTBT1VQN7"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-FNTBT1VQN7');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Sahl</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="../assets/images/app-store.png" type="image/x-icon">
    <link rel="stylesheet" href="../login/css/style.css">
</head>
<body>

    <!-- ── Splash Screen ── -->
    <div id="splash">
        <div class="splash-icon-wrap">
            <div class="splash-ring-outer"></div>
            <div class="splash-ring"></div>
            <div class="splash-icon">
                <img src="../assets/images/app-store.png" alt="Sahl">
            </div>
        </div>
        <div class="splash-wordmark">Sahl <em>App</em></div>
        <div class="splash-tagline">Plateforme Éducative · Quantum Group</div>
        <div class="splash-progress-track">
            <div class="splash-progress-fill"></div>
        </div>
        <div class="splash-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- Atmospheric background -->
    <div class="bg">
        <div class="bg-blob bg-blob-1"></div>
        <div class="bg-blob bg-blob-2"></div>
        <div class="bg-blob bg-blob-3"></div>
    </div>

    <div class="page">

        <!-- Header -->
        <div class="header">
            <div class="icon-ring">
                <img src="../assets/images/app-store.png" alt="Sahl">
            </div>
            <div class="header-eyebrow">Quantum Group</div>
            <h1 class="header-title">Bienvenue sur<br><em>Sahl App</em></h1>
            <p class="header-sub">Connectez-vous pour accéder à votre espace</p>
        </div>

        <!-- Card -->
        <div class="card">

            <!-- Alerts -->
            <div class="alert alert-error" id="errorMessage">
                <i class="fas fa-circle-exclamation"></i>
                <span id="errorText"></span>
            </div>
            <div class="alert alert-success" id="successMessage">
                <i class="fas fa-circle-check"></i>
                <span id="successText"></span>
            </div>

            <!-- Form -->
            <form id="loginForm">

                <div class="form-section-label">Vos identifiants</div>

                <div class="field-group">
                    <!-- Username -->
                    <div class="field-row">
                        <span class="field-icon"><i class="fas fa-at"></i></span>
                        <input
                            type="text"
                            id="username"
                            class="field-input"
                            placeholder="Adresse e-mail"
                            required
                            autocomplete="username"
                        >
                    </div>
                    <!-- Password -->
                    <div class="field-row">
                        <span class="field-icon"><i class="fas fa-lock"></i></span>
                        <input
                            type="password"
                            id="password"
                            class="field-input"
                            placeholder="Mot de passe"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="toggle-eye" id="togglePassword" aria-label="Afficher le mot de passe">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="loginButton">
                    <span>Se connecter</span>
                    <span class="btn-arrow"><i class="fas fa-arrow-right"></i></span>
                </button>

            </form>

            <div class="divider">
                <div class="divider-line"></div>
                <span class="divider-text">ou</span>
                <div class="divider-line"></div>
            </div>

        </div>

        <!-- Create account -->
        <a href="../inscrire.html" class="btn-secondary" id="freeVersionBtn">
            <span class="icon-dot"><i class="fas fa-user-plus"></i></span>
            Créer un compte
        </a>

        <!-- Footer -->
        <div class="footer">
            <span>Sahl App</span>
            <div class="footer-dot"></div>
            <span>© 2026 Quantum Group</span>
        </div>

    </div>

<script src="../login/js/ACC.js"></script>
    <script src="../login/js/script.js"></script>
</body>
</html>
