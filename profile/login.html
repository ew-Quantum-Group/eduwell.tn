<!DOCTYPE html>
<html lang="fr">
<head>
   <!-- Google tag (gtag.js) -->
   <script async src="https://www.googletagmanager.com/gtag/js?id=G-FNTBT1VQN7"></script>
   <script>
       window.dataLayer = window.dataLayer || [];
       function gtag(){dataLayer.push(arguments);}
       gtag('js', new Date());
       gtag('config', 'G-FNTBT1VQN7');
   </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | Sahl Learn</title>
  <link rel="shortcut icon" href="../assets/images/app-store.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../login/css/style.css">
 
</head>
<body>

<!-- ═══════════ SPLASH ═══════════ -->
<div id="splash">
  <div class="splash-icon-wrap">
    <div class="splash-ring-outer"></div>
    <div class="splash-ring"></div>
    <div class="splash-icon">✦</div>
  </div>
  <div class="splash-wordmark">Sahl <em>Learn</em></div>
 
  </div>
</div>

<!-- ═══════════ LEFT ═══════════ -->
<div class="left">
  <div class="blob1"></div>
  <div class="blob2"></div>

  <div class="logo">
    <div class="logo-icon">✦</div>
    Sahl <em>Learn</em>
  </div>

  <div class="stage">
    <div class="characters" id="characters">

      <!-- PURPLE -->
      <div class="char" id="purple">
        <div class="eyes" id="purple-eyes" style="left:42px;top:38px;gap:28px;">
          <div class="eyeball" id="purple-eye-l" style="width:18px;height:18px;">
            <div class="pupil" id="purple-pupil-l" style="width:7px;height:7px;"></div>
          </div>
          <div class="eyeball" id="purple-eye-r" style="width:18px;height:18px;">
            <div class="pupil" id="purple-pupil-r" style="width:7px;height:7px;"></div>
          </div>
        </div>
      </div>

      <!-- BLACK -->
      <div class="char" id="black">
        <div class="eyes" id="black-eyes" style="left:24px;top:30px;gap:22px;">
          <div class="eyeball" id="black-eye-l" style="width:16px;height:16px;">
            <div class="pupil" id="black-pupil-l" style="width:6px;height:6px;"></div>
          </div>
          <div class="eyeball" id="black-eye-r" style="width:16px;height:16px;">
            <div class="pupil" id="black-pupil-r" style="width:6px;height:6px;"></div>
          </div>
        </div>
      </div>

      <!-- ORANGE -->
      <div class="char" id="orange">
        <div class="eyes" id="orange-eyes" style="left:80px;top:90px;gap:28px;">
          <div class="pupil-only" id="orange-pupil-l" style="width:12px;height:12px;"></div>
          <div class="pupil-only" id="orange-pupil-r" style="width:12px;height:12px;"></div>
        </div>
      </div>

      <!-- YELLOW -->
      <div class="char" id="yellow">
        <div class="eyes" id="yellow-eyes" style="left:50px;top:38px;gap:22px;">
          <div class="pupil-only" id="yellow-pupil-l" style="width:12px;height:12px;"></div>
          <div class="pupil-only" id="yellow-pupil-r" style="width:12px;height:12px;"></div>
        </div>
        <div class="mouth" id="yellow-mouth" style="left:38px;top:88px;"></div>
      </div>

    </div>
  </div>

  <div class="left-footer">
    <a href="#">Politique de confidentialité</a>
    <a href="#">Conditions d'utilisation</a>
    <a href="#">Contact</a>
  </div>
</div>

<!-- ═══════════ RIGHT ═══════════ -->
<div class="right">
  <div class="form-wrap">

    <div class="form-eyebrow">Quantum Group</div>
    <h1 class="form-title">Bienvenue sur<br><em>Sahl Learn</em></h1>
    <p class="form-sub">Connectez-vous pour accéder à votre espace</p>

    <!-- Alerts -->
    <div class="alert-box alert-error" id="error-box">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="error-text"></span>
    </div>
    <div class="alert-box alert-success" id="success-box">
      <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span id="success-text"></span>
    </div>

    <!-- Form -->
    <form id="login-form" novalidate>
      <div class="field">
        <label for="email">Adresse e-mail</label>
        <input id="email" type="email" placeholder="votre@email.com" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Mot de passe</label>
        <div class="pw-wrap">
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Afficher le mot de passe">
            <svg id="eye-icon" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="row">
        <label class="remember">
          <input type="checkbox" id="remember" />
          Se souvenir de moi
        </label>
        <a href="#" class="forgot">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="btn-primary" id="submit-btn">
        <span id="btn-label">Se connecter</span>
        <div class="btn-arrow" id="btn-arrow">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span>ou</span>
      <div class="divider-line"></div>
    </div>

    <a href="../inscrire" class="btn-secondary">
      <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/>
        <line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>
      </svg>
      Créer un compte
    </a>

    <div class="form-footer">
      Sahl Learn &nbsp;·&nbsp; © 2026 Quantum Group
    </div>

  </div>
</div>

<script src="../login/js/ACC.js"></script>
<script src="../login/js/script.js"></script>
</body>
</html>
