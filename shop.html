<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page introuvable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --text-primary: #1a1a18;
      --text-secondary: #6b6b67;
      --text-tertiary: #a5a5a0;
      --border: rgba(0, 0, 0, 0.12);
      --border-hover: rgba(0, 0, 0, 0.25);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 24px;
    }



    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
      animation: fadeUp 0.6s ease both;
    }

    /* Icon */
    .icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 88px;
      height: 88px;
      border-radius: var(--radius-xl);
      border: 0.5px solid var(--border);
      background: var(--bg-secondary);
      margin-bottom: 2rem;
      position: relative;
      animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      animation-delay: 0.1s;
    }

    .icon-wrap i {
      font-size: 40px;
      color: var(--text-secondary);
    }

    .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #E24B4A;
      color: #fff;
      font-size: 11px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.03em;
    }

    /* Code */
    .code {
      font-family: 'Syne', sans-serif;
      font-size: 96px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -5px;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.2s;
    }

    /* Title */
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 1.25rem;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.3s;
    }

    /* Divider */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--border-hover);
      margin: 0 auto 1.5rem;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.35s;
    }

    /* Description */
    p.desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-bottom: 2rem;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.4s;
    }

    p.desc strong {
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border-hover);
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease, transform 0.1s ease, border-color 0.15s ease;
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.5s;
    }

    .btn i {
      font-size: 16px;
      transition: transform 0.2s ease;
    }

    .btn:hover {
      background: var(--bg-secondary);
      border-color: var(--border-hover);
    }

    .btn:hover i {
      transform: translateX(-3px);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* Hint */
    p.hint {
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--text-tertiary);
      animation: fadeUp 0.5s ease both;
      animation-delay: 0.55s;
    }

    /* Animations */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.7);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="icon-wrap">
      <i class="ti ti-shopping-bag"></i>
      <span class="badge">404</span>
    </div>

    <div class="code">404</div>

    <h1>Page introuvable</h1>

    <div class="divider"></div>

    <p class="desc">
      La page que tu cherches n'existe pas ou a été déplacée.<br>
      Bon courage pour le <strong>Bac 2027</strong> — focus sur ce qui compte !
    </p>

    <a class="btn" href="/" id="homeBtn">
      <i class="ti ti-arrow-left"></i>
      Retour à la page d'accueil
    </a>

    <p class="hint">Si le problème persiste, contacte le support.</p>

  </div>

  <script>
    document.getElementById('homeBtn').addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = '/';
    });
  </script>

</body>
</html>
